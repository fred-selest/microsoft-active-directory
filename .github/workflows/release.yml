# =============================================================================
# GitHub Actions - Release Automatique
# Cree des releases avec packages Windows/Linux separes
# =============================================================================

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.17.0)'
        required: true
        default: '1.17.0'

jobs:
  # ===========================================================================
  # Creation de la release GitHub
  # ===========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read CHANGELOG
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
            if [ -z "$NOTES" ]; then
              NOTES=$(head -50 CHANGELOG.md)
            fi
          else
            NOTES="Release version ${VERSION}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: AD Web Interface v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Package Windows
  # ===========================================================================
  build-windows:
    name: Build Windows Package
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Windows package
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          PACKAGE_NAME="AD-WebInterface-${VERSION}-Windows"

          mkdir -p dist/${PACKAGE_NAME}

          rsync -av --exclude='.git' \
                    --exclude='*.sh' \
                    --exclude='__pycache__' \
                    --exclude='*.pyc' \
                    --exclude='venv' \
                    --exclude='logs' \
                    --exclude='data' \
                    --exclude='.env' \
                    --exclude='dist' \
                    . dist/${PACKAGE_NAME}/

          cd dist
          zip -r ${PACKAGE_NAME}.zip ${PACKAGE_NAME}

      - name: Upload Windows package
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: dist/AD-WebInterface-${{ needs.create-release.outputs.version }}-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Package Linux
  # ===========================================================================
  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Linux package
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          PACKAGE_NAME="AD-WebInterface-${VERSION}-Linux"

          mkdir -p dist/${PACKAGE_NAME}

          rsync -av --exclude='.git' \
                    --exclude='*.bat' \
                    --exclude='*.vbs' \
                    --exclude='*.ps1' \
                    --exclude='*.exe' \
                    --exclude='__pycache__' \
                    --exclude='*.pyc' \
                    --exclude='venv' \
                    --exclude='logs' \
                    --exclude='data' \
                    --exclude='.env' \
                    --exclude='dist' \
                    . dist/${PACKAGE_NAME}/

          chmod +x dist/${PACKAGE_NAME}/*.sh 2>/dev/null || true

          cd dist
          tar -czvf ${PACKAGE_NAME}.tar.gz ${PACKAGE_NAME}

      - name: Upload Linux package
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: dist/AD-WebInterface-${{ needs.create-release.outputs.version }}-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
