{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-messages">
    {% for category, message in messages %}
    <div class="alert alert-{{ 'success' if category == 'success' else 'error' if category == 'error' else 'warning' if category == 'warning' else 'info' }} alert-dismissible fade-in" role="alert">
        {{ message }}
        <button type="button" class="alert-close" onclick="this.parentElement.remove()">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
