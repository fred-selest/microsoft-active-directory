{#
    Partial: CSS pour Password Audit
    Usage: {% include 'password_audit/_styles.html' %}
#}

<style>
/* Dashboard */
.audit-dashboard {
    display: none;
}

.audit-dashboard.active {
    display: block;
    animation: fadeIn 0.5s ease;
}

/* Score global */
.global-score-card {
    text-align: center;
    margin-bottom: 1.5rem;
}

.score-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
}

.score-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 8px solid #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.score-circle.success {
    border-color: #28a745;
    color: #28a745;
    box-shadow: 0 0 20px rgba(40, 167, 69, 0.3);
}

.score-circle.info {
    border-color: #17a2b8;
    color: #17a2b8;
    box-shadow: 0 0 20px rgba(23, 162, 184, 0.3);
}

.score-circle.warning {
    border-color: #ffc107;
    color: #ffc107;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
}

.score-circle.danger {
    border-color: #dc3545;
    color: #dc3545;
    box-shadow: 0 0 20px rgba(220, 53, 69, 0.3);
}

.score-value {
    font-size: 2.5rem;
    font-weight: bold;
}

.score-label {
    font-size: 1rem;
    color: var(--text-secondary);
    text-align: center;
}

/* Statistiques */
.audit-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
}

@media (min-width: 1024px) {
    .audit-stats-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* Politique */
.policy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
}

.policy-item {
    display: flex;
    flex-direction: column;
    padding: 1rem;
    background: var(--bg-tertiary);
    border-radius: 8px;
}

.policy-label {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
}

.policy-value {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--primary);
}

/* Recommandations */
.recommendations-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.recommendation-item {
    padding: 1rem;
    border-radius: 8px;
    border-left: 4px solid #e0e0e0;
}

.recommendation-item.critical {
    border-left-color: #dc3545;
    background: rgba(220, 53, 69, 0.05);
}

.recommendation-item.warning,
.recommendation-item.high {
    border-left-color: #ffc107;
    background: rgba(255, 193, 7, 0.05);
}

.recommendation-item.info,
.recommendation-item.success {
    border-left-color: #17a2b8;
    background: rgba(23, 162, 184, 0.05);
}

.recommendation-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
}

.recommendation-category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
}

.recommendation-priority {
    font-size: 0.75rem;
    font-weight: bold;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    text-transform: uppercase;
}

.recommendation-priority.critical {
    background: #dc3545;
    color: white;
}

.recommendation-priority.warning,
.recommendation-priority.high {
    background: #ffc107;
    color: #212529;
}

.recommendation-priority.info,
.recommendation-priority.success {
    background: #17a2b8;
    color: white;
}

/* Tableaux */
.data-table .btn-action {
    white-space: nowrap;
    padding: 0.25rem 0.75rem;
    font-size: 0.8125rem;
}

/* Responsive */
@media (max-width: 768px) {
    .score-circle {
        width: 120px;
        height: 120px;
        font-size: 2rem;
    }
    
    .score-value {
        font-size: 2rem;
    }
    
    .page-actions {
        flex-direction: column;
        gap: 0.75rem;
    }
    
    #audit-progress-container {
        max-width: 100%;
        margin: 0.75rem 0 0 0 !important;
    }
}

/* Animations */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes slideIn {
    from { 
        opacity: 0; 
        transform: translateX(-20px);
    }
    to { 
        opacity: 1; 
        transform: translateX(0);
    }
}

@keyframes progressPulse {
    0%, 100% { 
        box-shadow: 0 0 10px rgba(0, 120, 212, 0.5);
        filter: brightness(1);
    }
    50% { 
        box-shadow: 0 0 20px rgba(0, 120, 212, 0.8);
        filter: brightness(1.2);
    }
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* Progress bar */
#audit-progress-container {
    animation: slideIn 0.3s ease;
    border: 1px solid rgba(0, 120, 212, 0.2);
}

#audit-progress-bar {
    animation: progressPulse 1.5s ease-in-out infinite;
    position: relative;
}

#audit-progress-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.3) 50%,
        transparent 100%
    );
    animation: shimmer 2s linear infinite;
}

/* Loading overlay */
.loading-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

.loading-spinner {
    background: white;
    padding: 2rem;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #0078d4;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}

.loading-message {
    color: #333;
    font-weight: 500;
    margin: 0;
}

/* Dark mode */
body.dark-mode #audit-progress-container {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-color: rgba(0, 120, 212, 0.4);
}

body.dark-mode #audit-progress-message {
    color: var(--dark-text-secondary);
}

body.dark-mode #audit-progress-text {
    color: #4c9ff5;
}

body.dark-mode .loading-spinner {
    background: var(--bg-secondary);
}

body.dark-mode .loading-message {
    color: var(--text-primary);
}
</style>
