{% extends 'base.html' %}

{% block title %}Nouvel utilisateur - AD Web Interface{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Nouvel utilisateur</h2>
    <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Retour a la liste</a>
</div>

<div class="form-container">
    <form method="post" class="user-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-section">
            <h3>Informations de compte</h3>

            <div class="form-group">
                <label for="username">Identifiant (login) *</label>
                <input type="text" id="username" name="username" required placeholder="jdupont">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">Prenom</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Jean">
                </div>
                <div class="form-group">
                    <label for="last_name">Nom</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Dupont">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jean.dupont@domaine.com">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe initial">
                <small class="form-hint">Laissez vide pour ne pas definir de mot de passe initial</small>
            </div>

            {% if ous %}
            <div class="form-group">
                <label for="target_ou">Unite organisationnelle (OU)</label>
                <select id="target_ou" name="target_ou">
                    <option value="">CN=Users (par defaut)</option>
                    {% for ou in ous %}
                    <option value="{{ ou.dn }}">{{ ou.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Creer l'utilisateur</button>
            <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>

{% endblock %}
